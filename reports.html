<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 24px; }
        .controls { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .controls label { margin-right: 8px; }
        .table-container { overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 24px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
        .actions { display: flex; gap: 12px; }
        button { padding: 8px 16px; border: none; border-radius: 4px; background: #007bff; color: #fff; cursor: pointer; }
        button:disabled { background: #ccc; }
        .export-btns { margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Custom Reports</h1>
        <div class="controls">
            <div>
                <label for="data-source">Data Source:</label>
                <select id="data-source">
                    <option value="quotations">Quotations</option>
                    <option value="customers">Customers</option>
                    <option value="sales">Sales</option>
                </select>
            </div>
            <div>
                <label for="fields">Fields:</label>
                <select id="fields" multiple size="1" style="min-width: 180px;"></select>
            </div>
            <div>
                <label for="filter">Filter:</label>
                <input type="text" id="filter" placeholder="e.g. status:approved">
            </div>
            <div>
                <label for="date-from">From:</label>
                <input type="date" id="date-from">
            </div>
            <div>
                <label for="date-to">To:</label>
                <input type="date" id="date-to">
            </div>
            <div>
                <button id="run-report">Run Report</button>
            </div>
        </div>
        <div class="export-btns">
            <button id="export-pdf" disabled><i class="fa fa-file-pdf"></i> Export PDF</button>
            <button id="export-excel" disabled><i class="fa fa-file-excel"></i> Export Excel</button>
        </div>
        <div class="table-container">
            <table id="report-table" style="display:none;">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="reports.js"></script>
</body>
</html>
