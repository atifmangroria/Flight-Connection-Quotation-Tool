<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Management - Flight Connection</title>
  <style>
    :root{--accent:#0b76d1;--muted:#666;--success:#28a745;--warning:#f39c12;--danger:#e74c3c;--info:#17a2b8}
    body{font-family:Arial,Helvetica,sans-serif;background:#f3f6fb;margin:10px;color:#111}
    .wrap{max-width:1200px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 8px 24px rgba(12,20,40,0.06)}
    h1{margin:0 0 20px;font-size:24px;color:var(--accent)}
    h2{margin:0 0 15px;font-size:18px;color:var(--accent)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .header-right{display:flex;gap:10px}
    .section { margin-bottom: 30px; }
    .btn-primary {
      background: linear-gradient(135deg, #0b76d1, #085ea3);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 4px rgba(11, 118, 209, 0.3);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #085ea3, #064c8a);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(11, 118, 209, 0.4);
    }
    .btn-logout {
      background: linear-gradient(135deg, #dc3545, #c82333);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 4px rgba(220, 53, 69, 0.3);
    }
    .btn-logout:hover {
      background: linear-gradient(135deg, #c82333, #a71e2a);
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(220, 53, 69, 0.4);
    }
    .btn-danger { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-danger:hover { background: #c0392b; }
    .btn-success { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-success:hover { background: #229954; }
    .notification { padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    .notification.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .notification.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    table th { background: #f8f9fa; color: var(--accent); padding: 12px; text-align: left; font-weight: 600; border: 1px solid #ddd; }
    table td { padding: 12px; border: 1px solid #ddd; }
    table tr:hover { background: #f9f9f9; }
    .badge { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.active { background: #d4edda; color: #155724; }
    .badge.inactive { background: #f8d7da; color: #721c24; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 5px rgba(11, 118, 209, 0.2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; }
    .modal-header { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
    .permissions-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .permission-item { display: flex; align-items: center; }
    .permission-item input { width: auto; margin-right: 8px; }
    .small { font-size: 12px; color: var(--muted); margin-top: 5px; }
    @media (max-width:768px){
      body { margin: 5px; }
      .wrap { padding: 10px; }
      .form-row { grid-template-columns: 1fr; }
      .permissions-list { grid-template-columns: 1fr; }
      button { min-height: 44px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div>
      <h1>Agent Management</h1>
      <div class="small" id="userInfo">User: Loading...</div>
    </div>
    <div class="header-right">
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div id="notification"></div>

  <!-- Create Agent Section -->
  <div class="section">
    <h2>➕ Create New Agent</h2>
    <form id="createAgentForm" onsubmit="handleCreateAgent(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="agentName">Agent Name *</label>
          <input type="text" id="agentName" placeholder="Enter agent name" required>
        </div>
        <div class="form-group">
          <label for="agentEmail">Agent Email *</label>
          <input type="email" id="agentEmail" placeholder="Enter agent email" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="agentPhone">Agent Phone *</label>
          <input type="tel" id="agentPhone" placeholder="Enter agent phone" required>
        </div>
        <div class="form-group">
          <label for="agentStatus">Status</label>
          <select id="agentStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Permissions</label>
        <div class="permissions-list">
          <div class="permission-item">
            <input type="checkbox" id="perm-create-quotation" checked>
            <label for="perm-create-quotation">Create Quotation</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-edit-quotation" checked>
            <label for="perm-edit-quotation">Edit Quotation</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-delete-quotation" checked>
            <label for="perm-delete-quotation">Delete Quotation</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-view-packages">
            <label for="perm-view-packages">View Packages</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-create-packages">
            <label for="perm-create-packages">Create Packages</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="perm-view-reports">
            <label for="perm-view-reports">View Reports</label>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-success">Create Agent</button>
    </form>
  </div>

  <!-- Agents List Section -->
  <div class="section">
    <h2>📊 My Agents</h2>
    <table>
      <thead>
        <tr>
          <th>Agent Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="agentsTable">
        <tr><td colspan="6" style="text-align: center; color: #999;">Loading agents...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Edit Agent Modal -->
<div id="editAgentModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Edit Agent</div>
    <form id="editAgentForm">
      <div class="form-group">
        <label for="editAgentName">Agent Name</label>
        <input type="text" id="editAgentName" required>
      </div>
      <div class="form-group">
        <label for="editAgentStatus">Status</label>
        <select id="editAgentStatus">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div class="form-group">
        <label>Permissions</label>
        <div class="permissions-list">
          <div class="permission-item">
            <input type="checkbox" id="edit-perm-create-quotation">
            <label for="edit-perm-create-quotation">Create Quotation</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="edit-perm-edit-quotation">
            <label for="edit-perm-edit-quotation">Edit Quotation</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="edit-perm-delete-quotation">
            <label for="edit-perm-delete-quotation">Delete Quotation</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="edit-perm-view-packages">
            <label for="edit-perm-view-packages">View Packages</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="edit-perm-create-packages">
            <label for="edit-perm-create-packages">Create Packages</label>
          </div>
          <div class="permission-item">
            <input type="checkbox" id="edit-perm-view-reports">
            <label for="edit-perm-view-reports">View Reports</label>
          </div>
        </div>
      </div>
    </form>
    <div class="modal-actions">
      <button onclick="closeEditModal()" style="background: #95a5a6; color: white;">Cancel</button>
      <button onclick="saveAgentChanges()" style="background: #27ae60; color: white;">Save Changes</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDx3Qxt84vJlz_-mXuxiC0W2flaLadr9Ws",
    authDomain: "fc-quotation-tool.firebaseapp.com",
    projectId: "fc-quotation-tool",
    storageBucket: "fc-quotation-tool.firebasestorage.app",
    messagingSenderId: "370566945624",
    appId: "1:370566945624:web:a84b20d5a8f99d20a6e32d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let currentAgentId = null;
  let lastAuthCheck = 0;
  let authCheckDebounceTimer = null;

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    // Debounce auth checks - only run once every 2 seconds
    const now = Date.now();
    if (now - lastAuthCheck < 2000) {
      clearTimeout(authCheckDebounceTimer);
      authCheckDebounceTimer = setTimeout(() => performAuthCheck(user), 2000 - (now - lastAuthCheck));
      return;
    }

    performAuthCheck(user);
  });

  async function performAuthCheck(user) {
    try {
      lastAuthCheck = Date.now();
      const userDoc = await db.collection('users').doc(user.uid).get();
      
      if (!userDoc.exists) {
        console.error('User document does not exist');
        showNotification('User document error. Please login again.', 'error');
        setTimeout(() => auth.signOut(), 1000);
        return;
      }
      
      const userData = userDoc.data();
      if (userData.status !== 'approved') {
        console.error('User status not approved:', userData.status);
        showNotification('Access denied. Please login with approved account.', 'error');
        setTimeout(() => auth.signOut(), 1000);
        return;
      }

      currentUser = user;
      document.getElementById('userInfo').textContent = `User: ${userData.fullName}`;
      loadAgents();
    } catch (error) {
      console.error('Auth check error:', error);
      // Don't logout on error - just skip this check
    }
  }

  function showNotification(msg, type = 'success') {
    const notif = document.getElementById('notification');
    notif.textContent = msg;
    notif.className = 'notification ' + type;
    setTimeout(() => notif.textContent = '', 3000);
  }

  async function handleCreateAgent(e) {
    e.preventDefault();
    
    const agentName = document.getElementById('agentName').value.trim();
    const agentEmail = document.getElementById('agentEmail').value.trim();
    const agentPhone = document.getElementById('agentPhone').value.trim();
    const agentStatus = document.getElementById('agentStatus').value;

    const permissions = {
      create_quotation: document.getElementById('perm-create-quotation').checked,
      edit_quotation: document.getElementById('perm-edit-quotation').checked,
      delete_quotation: document.getElementById('perm-delete-quotation').checked,
      view_packages: document.getElementById('perm-view-packages').checked,
      create_packages: document.getElementById('perm-create-packages').checked,
      view_reports: document.getElementById('perm-view-reports').checked
    };

    try {
      const agentId = db.collection('agents').doc().id;
      await db.collection('agents').doc(agentId).set({
        name: agentName,
        email: agentEmail,
        phone: agentPhone,
        status: agentStatus,
        permissions: permissions,
        ownerId: currentUser.uid,
        createdAt: new Date().toISOString(),
        createdBy: currentUser.uid
      });

      showNotification('✅ Agent created successfully', 'success');
      document.getElementById('createAgentForm').reset();
      loadAgents();
    } catch (error) {
      console.error('Error creating agent:', error);
      showNotification('Error creating agent: ' + error.message, 'error');
    }
  }

  async function loadAgents() {
    try {
      const snapshot = await db.collection('agents')
        .where('ownerId', '==', currentUser.uid)
        .orderBy('createdAt', 'desc')
        .get();

      const agents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      
      if (agents.length === 0) {
        document.getElementById('agentsTable').innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No agents created yet</td></tr>';
        return;
      }

      document.getElementById('agentsTable').innerHTML = agents.map(agent => `
        <tr>
          <td>${agent.name}</td>
          <td>${agent.email}</td>
          <td>${agent.phone}</td>
          <td><span class="badge ${agent.status}">${agent.status.toUpperCase()}</span></td>
          <td>${new Date(agent.createdAt).toLocaleDateString()}</td>
          <td>
            <button class="btn btn-primary" onclick="editAgent('${agent.id}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteAgent('${agent.id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch (error) {
      console.error('Error loading agents:', error);
      showNotification('Error loading agents', 'error');
    }
  }

  async function editAgent(agentId) {
    try {
      const agentDoc = await db.collection('agents').doc(agentId).get();
      const agent = agentDoc.data();

      currentAgentId = agentId;
      document.getElementById('editAgentName').value = agent.name;
      document.getElementById('editAgentStatus').value = agent.status;

      // Set permissions
      document.getElementById('edit-perm-create-quotation').checked = agent.permissions?.create_quotation || false;
      document.getElementById('edit-perm-edit-quotation').checked = agent.permissions?.edit_quotation || false;
      document.getElementById('edit-perm-delete-quotation').checked = agent.permissions?.delete_quotation || false;
      document.getElementById('edit-perm-view-packages').checked = agent.permissions?.view_packages || false;
      document.getElementById('edit-perm-create-packages').checked = agent.permissions?.create_packages || false;
      document.getElementById('edit-perm-view-reports').checked = agent.permissions?.view_reports || false;

      document.getElementById('editAgentModal').classList.add('active');
    } catch (error) {
      console.error('Error editing agent:', error);
      showNotification('Error loading agent details', 'error');
    }
  }

  function closeEditModal() {
    document.getElementById('editAgentModal').classList.remove('active');
    currentAgentId = null;
  }

  async function saveAgentChanges() {
    try {
      const permissions = {
        create_quotation: document.getElementById('edit-perm-create-quotation').checked,
        edit_quotation: document.getElementById('edit-perm-edit-quotation').checked,
        delete_quotation: document.getElementById('edit-perm-delete-quotation').checked,
        view_packages: document.getElementById('edit-perm-view-packages').checked,
        create_packages: document.getElementById('edit-perm-create-packages').checked,
        view_reports: document.getElementById('edit-perm-view-reports').checked
      };

      await db.collection('agents').doc(currentAgentId).update({
        name: document.getElementById('editAgentName').value,
        status: document.getElementById('editAgentStatus').value,
        permissions: permissions
      });

      showNotification('✅ Agent updated successfully', 'success');
      closeEditModal();
      loadAgents();
    } catch (error) {
      console.error('Error updating agent:', error);
      showNotification('Error updating agent', 'error');
    }
  }

  async function deleteAgent(agentId) {
    if (confirm('Are you sure you want to delete this agent?')) {
      try {
        await db.collection('agents').doc(agentId).delete();
        showNotification('✅ Agent deleted successfully', 'success');
        loadAgents();
      } catch (error) {
        console.error('Error deleting agent:', error);
        showNotification('Error deleting agent', 'error');
      }
    }
  }

  function logout() {
    auth.signOut().then(() => {
      window.location.href = 'login.html';
    });
  }
</script>

</body>
</html>
