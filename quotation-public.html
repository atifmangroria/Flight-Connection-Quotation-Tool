<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quotation Link - Flight Connection</title>
<style>
  :root{--accent:#0b76d1;--muted:#555;--bg:#f3f6fb;--card:#fff;--border:#dce3ef;--success:#28a745;--danger:#e74c3c}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#111}
  .wrap{max-width:980px;margin:24px auto;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,0.05)}
  h1{margin-top:0;color:var(--accent)}
  .small{color:var(--muted);font-size:14px}
  .button-group{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  button{border:none;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer}
  button.primary{background:var(--accent);color:#fff}
  button.secondary{background:#f3f6fb;color:#111;border:1px solid #c8d4e3}
  .quote-info{margin-top:20px;border:1px solid var(--border);border-radius:10px;padding:18px;background:#fff}
  .quote-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .quote-row label{font-weight:700;color:#333}
  .quote-row div{color:#444}
  .message{padding:12px;border-radius:8px;margin-bottom:14px}
  .message.info{background:#e7f1ff;color:#0b76d1}
  .message.success{background:#e6f7ea;color:#1f8b47}
  .message.error{background:#fde8e8;color:#a82222}
  .link-box{display:flex;gap:10px;align-items:center;margin-top:10px}
  .link-box input{flex:1;padding:10px 12px;border:1px solid #ccc;border-radius:8px;background:#f8f8f8;outline:none}
  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:1000}
  .modal-overlay.active{display:flex}
  .modal{width:100%;max-width:520px;background:#fff;border-radius:14px;padding:22px;box-shadow:0 18px 40px rgba(0,0,0,0.18);}
  .modal h2{margin-top:0}
  .modal label{display:block;margin:12px 0 4px;font-weight:700}
  .modal input[type=text], .modal input[type=tel]{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px}
  .modal textarea{width:100%;height:180px;padding:10px 12px;border:1px solid #ccc;border-radius:8px;resize:vertical;font-family:inherit}
  .modal-footer{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;justify-content:flex-end}
  .modal-footer button{min-width:120px}
  .checkbox-row{display:flex;align-items:center;gap:10px;margin-top:12px}
  .checkbox-row input{width:18px;height:18px}
  .hide-price .price-breakdown, .hide-price .toggle-price-breakdown{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>Customer Quotation Preview</h1>
  <div id="pageInfo" class="small">Loading quotation link...</div>
  <div id="quoteMessage" class="message info" style="display:none"></div>
  <div id="quotationContent" class="quote-info"></div>
  <div class="button-group">
    <button id="btnAcceptQuotation" class="primary" type="button" style="display:none">Accept Quotation</button>
    <button id="btnOpenTerms" class="secondary" type="button" style="display:none">View Terms & Conditions</button>
  </div>
</div>

<div id="acceptModal" class="modal-overlay">
  <div class="modal">
    <h2>Accept Quotation</h2>
    <p>Please enter your name and phone number, then review and accept the terms & conditions.</p>
    <label for="customerName">Name</label>
    <input type="text" id="customerName" placeholder="Customer name" />
    <label for="customerPhone">Phone</label>
    <input type="tel" id="customerPhone" placeholder="Phone number" />
    <label for="customerTerms">Terms & Conditions</label>
    <textarea id="customerTerms" readonly></textarea>
    <div class="checkbox-row">
      <input type="checkbox" id="customerAcceptCheck" />
      <label for="customerAcceptCheck">I accept the terms and conditions</label>
    </div>
    <div class="modal-footer">
      <button id="btnCancelAccept" class="secondary" type="button">Cancel</button>
      <button id="btnSubmitAccept" class="primary" type="button">Submit Acceptance</button>
    </div>
  </div>
</div>

<script type="module" src="quotation-public.js"></script>
</body>
</html>
