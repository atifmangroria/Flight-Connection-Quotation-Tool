<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Flight Connection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0b76d1, #0d5fa8); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    h1 { text-align: center; color: #0b76d1; margin-bottom: 30px; font-size: 28px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #0b76d1; box-shadow: 0 0 0 3px rgba(11, 118, 209, 0.1); }
    button { width: 100%; padding: 12px; background: #0b76d1; color: white; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; font-size: 16px; }
    button:hover { background: #085ea3; }
    .notification { padding: 15px; border-radius: 5px; margin-bottom: 20px; font-weight: 600; }
    .notification.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .notification.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .notification.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .link { text-align: center; margin-top: 20px; }
    .link a { color: #0b76d1; text-decoration: none; font-weight: 600; }
    .link a:hover { text-decoration: underline; }
    .info-box { background: #f0f7ff; border-left: 4px solid #0b76d1; padding: 15px; margin-bottom: 20px; border-radius: 5px; font-size: 13px; color: #333; }
  </style>
</head>
<body>

<div class="container">
  <h1>Create Account</h1>
  
  <div class="info-box">
    📝 Sign up to get started. Your account will be reviewed by our admin team. Once approved, you'll receive login access.
  </div>

  <div id="notification"></div>

  <form id="signupForm">
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="fullName" required placeholder="e.g., John Doe">
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="email" required placeholder="e.g., john@example.com">
    </div>

    <div class="form-group">
      <label>Password *</label>
      <input type="password" id="password" required placeholder="Min 6 characters">
    </div>

    <div class="form-group">
      <label>Confirm Password *</label>
      <input type="password" id="confirmPassword" required placeholder="Confirm your password">
    </div>

    <div class="form-group">
      <label>Company Name *</label>
      <input type="text" id="company" required placeholder="Your company name">
    </div>

    <div class="form-group">
      <label>Phone *</label>
      <input type="tel" id="phone" required placeholder="+1234567890">
    </div>

    <div class="form-group">
      <label>User Type *</label>
      <select id="userType" required>
        <option value="">-- Select --</option>
        <option value="agency">Travel Agency</option>
        <option value="operator">Tour Operator</option>
        <option value="vendor">Vendor</option>
        <option value="other">Other</option>
      </select>
    </div>

    <button type="submit">Sign Up</button>
  </form>

  <div class="link">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDx3Qxt84vJlz_-mXuxiC0W2flaLadr9Ws",
    authDomain: "fc-quotation-tool.firebaseapp.com",
    projectId: "fc-quotation-tool",
    storageBucket: "fc-quotation-tool.firebasestorage.app",
    messagingSenderId: "370566945624",
    appId: "1:370566945624:web:a84b20d5a8f99d20a6e32d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function showNotification(msg, type = 'success') {
    const notif = document.getElementById('notification');
    notif.textContent = msg;
    notif.className = 'notification ' + type;
  }

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const company = document.getElementById('company').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const userType = document.getElementById('userType').value;

    // Validation
    if (password.length < 6) {
      showNotification('Password must be at least 6 characters', 'error');
      return;
    }

    if (password !== confirmPassword) {
      showNotification('Passwords do not match', 'error');
      return;
    }

    try {
      showNotification('Creating account...', 'info');

      // Create Firebase Auth user
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const uid = userCredential.user.uid;

      // Create user document in Firestore with pending approval
      await db.collection('users').doc(uid).set({
        uid: uid,
        fullName: fullName,
        email: email,
        company: company,
        phone: phone,
        userType: userType,
        status: 'pending', // pending, approved, rejected
        createdAt: new Date().toISOString(),
        approvedAt: null,
        approvedBy: null
      });

      showNotification('✅ Account created successfully! Waiting for admin approval.', 'success');
      
      // Reset form
      document.getElementById('signupForm').reset();

      // Redirect to login after 3 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);

    } catch (error) {
      console.error('Signup error:', error);
      showNotification('❌ ' + error.message, 'error');
    }
  });
</script>

</body>
</html>
