<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Notifications - Flight Connection</title>
<style>
  :root{--accent:#0b76d1;--muted:#666;--success:#28a745;--warning:#f39c12;--danger:#e74c3c;--info:#17a2b8}
  body{font-family:Arial,Helvetica,sans-serif;background:#f3f6fb;margin:10px;color:#111}
  .wrap{max-width:1100px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 8px 24px rgba(12,20,40,0.06)}
  h1{margin:0 0 10px;font-size:24px;color:var(--accent)}
  .small{font-size:14px;color:var(--muted);margin-top:4px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .header-right{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .btn-primary{background:linear-gradient(135deg,#0b76d1,#085ea3);color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:14px;transition:all 0.3s ease;box-shadow:0 2px 4px rgba(11,118,209,0.3)}
  .btn-primary:hover{background:linear-gradient(135deg,#085ea3,#064c8a);transform:translateY(-2px);box-shadow:0 4px 8px rgba(11,118,209,0.4)}
  .btn-secondary{background:#f3f6fb;color:#111;border:1px solid #c8d4e3;padding:10px 18px;border-radius:6px;cursor:pointer;font-size:14px;transition:background 0.2s ease}
  .btn-secondary:hover{background:#e9eff8}
  .notification-panel{background:#fff;border:1px solid #dce3ef;border-radius:12px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,0.04)}
  .notification-summary{font-size:14px;color:#555;margin-bottom:18px}
  .notification-page-list{display:block}
  .notification-page-table{width:100%;border-collapse:collapse;margin-top:10px}
  .notification-page-table th,.notification-page-table td{padding:12px 14px;border:1px solid #e8edf4;vertical-align:top}
  .notification-page-table th{background:#f5f8fb;color:#444;text-align:left;font-size:14px}
  .notification-page-table td{font-size:14px;color:#1b3d6f}
  .notification-table-final{background:#fff3f3}
  .notification-table-final td{border-color:#f1d4d4}
  .notification-action-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .notification-action-group button{background:#fff;border:1px solid #c8d4e3;padding:8px 12px;border-radius:6px;cursor:pointer;color:#111;font-size:13px;transition:background 0.2s ease}
  .notification-action-group button:hover{background:#f3f6fb}
  .notification-reminder-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
  .notification-reminder-input{padding:8px 10px;border:1px solid #c8d4e3;border-radius:6px;font-size:14px;min-width:200px}
  .notification-page-empty{background:#fff;border:1px solid #dce3ef;border-radius:10px;padding:18px;color:#444}
  .no-print{display:none!important}
  @media (max-width:768px){.wrap{padding:15px}.header{flex-direction:column;align-items:stretch}.header-right{justify-content:flex-start}button{width:100%}.notification-card-header{flex-direction:column;align-items:flex-start}}</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>Notifications</h1>
      <div class="small" id="pageInfo">Loading saved quotations...</div>
    </div>
    <div class="header-right">
      <button id="btnBack" class="btn-secondary" type="button" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
      <button id="btnRefresh" class="btn-primary" type="button">Refresh</button>
    </div>
  </div>

  <div class="notification-panel">
    <div class="notification-summary" id="notificationSummary">Fetching notifications...</div>
    <div class="notification-page-list" id="notificationPageList">
      <div class="notification-page-empty">Waiting for saved quotation data.</div>
    </div>
  </div>
</div>
<script type="module" src="notifications.js"></script>
</body>
</html>
