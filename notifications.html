<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Notifications - Flight Connection</title>
<style>
  :root{--accent:#0b76d1;--muted:#666;--success:#28a745;--warning:#f39c12;--danger:#e74c3c;--info:#17a2b8}
  body{font-family:Inter,system-ui,Arial,Helvetica,sans-serif;background:#f3f6fb;margin:10px;color:#111}
  .wrap{max-width:1120px;margin:0 auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 16px 40px rgba(12,20,40,0.08)}
  h1{margin:0 0 8px;font-size:28px;color:var(--accent)}
  .small{font-size:14px;color:#566078;margin-top:4px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .header-right{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .btn-primary{background:linear-gradient(135deg,#0b76d1,#085ea3);color:white;border:none;padding:12px 22px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;transition:all 0.25s ease;box-shadow:0 10px 20px rgba(11,118,209,0.2)}
  .btn-primary:hover{background:linear-gradient(135deg,#085ea3,#064c8a);transform:translateY(-1px);box-shadow:0 14px 28px rgba(11,118,209,0.22)}
  .btn-secondary{background:#f8fafc;color:#111;border:1px solid #d5dce7;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;transition:background 0.25s ease}
  .btn-secondary:hover{background:#eef4fb}
  .notification-panel{background:#fff;border:1px solid #e5ecf5;border-radius:18px;padding:22px;box-shadow:0 18px 36px rgba(15,30,70,0.06)}
  .notification-summary{font-size:15px;color:#4d617d;margin-bottom:16px}
  .notification-page-list{display:grid;gap:16px}
  .notification-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;margin-top:8px}
  .notification-card{border:1px solid #e7eef7;border-radius:16px;background:#fff;overflow:hidden;display:flex;flex-direction:column;transition:transform 0.2s ease,box-shadow 0.2s ease}
  .notification-card:hover{transform:translateY(-2px);box-shadow:0 18px 32px rgba(11,118,209,0.12)}
  .notification-card-final{border-color:#f1d4d4;background:#fff6f6}
  .notification-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:18px 20px 12px;background:#f8fbff}
  .notification-card-title{font-size:16px;font-weight:700;color:#122a4f;line-height:1.3}
  .notification-card-meta{font-size:13px;color:#5a6a80;margin-top:4px}
  .notification-card-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.02em}
  .notification-card-badge.followup{color:#0b76d1;background:rgba(11,118,209,.1)}
  .notification-card-badge.approval{color:#d87a1b;background:rgba(243,156,18,.12)}
  .notification-card-badge.booked{color:#1f7f30;background:rgba(40,167,69,.12)}
  .notification-card-badge.voucher{color:#1255b5;background:rgba(13,110,253,.12)}
  .notification-card-badge.general{color:#4a4f55;background:rgba(33,37,41,.08)}
  .notification-card-body{padding:18px 20px 0;display:grid;gap:12px}
  .notification-card-message{font-size:15px;line-height:1.7;color:#33415d}
  .notification-card-details{display:grid;gap:10px;padding-bottom:18px;border-bottom:1px solid #eef3f8}
  .notification-detail{display:grid;gap:4px}
  .notification-detail strong{font-size:13px;color:#4d6078;text-transform:uppercase;letter-spacing:.04em}
  .notification-detail span{font-size:14px;color:#2b3a51}
  .notification-card-footer{padding:16px 20px 20px;display:grid;gap:12px}
  .notification-action-group{display:flex;flex-wrap:wrap;gap:10px}
  .notification-action-group button{min-width:130px;background:#fff;border:1px solid #d5dce7;padding:10px 14px;border-radius:8px;cursor:pointer;color:#111;font-size:13px;font-weight:600;transition:background 0.2s ease,border-color 0.2s ease}
  .notification-action-group button:hover{background:#f3f7fb;border-color:#c8d4e3}
  .notification-reminder-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .notification-reminder-input{padding:10px 12px;border:1px solid #c8d4e3;border-radius:10px;font-size:14px;min-width:220px;flex:1;max-width:260px}
  .notification-page-empty{background:#fff;border:1px solid #dce3ef;border-radius:14px;padding:24px;color:#4d5e78;text-align:center;font-size:15px}
  .no-print{display:none!important}
  .modal-overlay{position:fixed;inset:0;background:rgba(12,20,40,0.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1300;backdrop-filter:blur(2px)}
  .modal-overlay[hidden]{display:none}
  .modal-content{width:100%;max-width:960px;background:#fff;border-radius:20px;box-shadow:0 24px 60px rgba(11,19,43,0.22);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
  .modal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:22px 24px;border-bottom:1px solid #eef3f8}
  .modal-header h2{margin:0;font-size:22px;color:#122a4f}
  .modal-body{padding:20px 24px;overflow:auto;min-height:180px}
  @media (max-width:900px){.wrap{padding:18px}.header{flex-direction:column;align-items:stretch}.header-right{justify-content:flex-start}.btn-primary,.btn-secondary{width:100%}.notification-card-header{flex-direction:column;align-items:flex-start}.notification-card-body{padding:16px 18px 0}.notification-card-footer{padding:16px 18px 18px}}
  @media (max-width:640px){body{margin:6px}.wrap{padding:16px}.notification-card-grid{grid-template-columns:1fr}.notification-action-group{flex-direction:column}.notification-action-group button{width:100%;min-width:0}}</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>Notifications</h1>
      <div class="small" id="pageInfo">Loading saved quotations...</div>
    </div>
    <div class="header-right">
      <button id="btnBack" class="btn-secondary" type="button" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
      <button id="btnScheduledReminders" class="btn-secondary" type="button">Scheduled reminders</button>
      <button id="btnRefresh" class="btn-primary" type="button">Refresh</button>
    </div>
  </div>

  <div class="notification-panel">
    <div class="notification-summary" id="notificationSummary">Fetching notifications...</div>
    <div class="notification-page-list" id="notificationPageList">
      <div class="notification-page-empty">Waiting for saved quotation data.</div>
    </div>
  </div>
</div>

<div id="scheduledReminderModal" class="modal-overlay" hidden>
  <div class="modal-content">
    <div class="modal-header">
      <div>
        <h2>Scheduled reminders</h2>
        <div class="small" id="scheduled-reminder-count">Loading scheduled reminder data...</div>
      </div>
      <button id="btnCloseReminderModal" class="btn-secondary" type="button">Close</button>
    </div>
    <div id="scheduled-reminder-body" class="modal-body">
      <div class="notification-page-empty">Fetching scheduled reminders...</div>
    </div>
  </div>
</div>
<script type="module" src="notifications.js"></script>
</body>
</html>
